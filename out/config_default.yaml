# bookmarks list
# thumbnail threads
# thumbnail cache dir
# video thumbnail dir
# default sort mode
# saved sort mode per folder (store in a different file?)
# imgui themes

bookmarks:
 - D:\projects\media_tag_system\out


# new layout for thumbnail options
thumbnail:
  threads: 8

  # Max amount of thumbnails you can upload at a time,
  # this blocks the main thread for a second to upload, so don't set this number too high
  uploads-per-frame: 16

  cache-path: $app_path$/thumbnail_cache
  cache-path-video: $app_path$/thumbnail_video_cache
  memory-cache-size: 20000

  size: 500

  # if 1, use the size above for thumbnails
  # if 0, remake them on the fly whenever the zoom size changes
  use-fixed-size: 0

  # basic JPEG XL thumbnail quality and speed control
  jxl-enable: 1

  jxl-distance: 3
  jxl-effort: 5


# 0 for immediate updates, 1 for vsync, -1 for adaptive vsync
vsync: 1

# When the window isn't focused, add a sleep time every frame, 0 to disable
sleep-time-no-focus: 5

# Sleep time when the program is running normally, ignoring video playback
sleep-time-focus: 1

# When the window does not need to be redraw, sleep every frame for this time
sleep-time-idle: 15

font-size: 17

# Disable video support
no-video: 0

gallery-show-filenames: 1

# Always draw new frames no matter what
always-draw: 0

# Default zoom level for gallery view
gallery-zoom-default: 200

# Scale to zoom in/out by with scroll wheel
media-zoom-scale: 0.1

# WINDOWS ONLY - Allows titlebar color to extend into the window, useful for DWMBlurGlass
dwm-extend: 0
use-custom-colors: 0

# gallery-header-background-color: [0.1, .1, .1, 0]
gallery-header-background-color: [0, 0, 0, 0]
gallery-sidebar-bg-color: [0, 0, 0, 0.5]
gallery-content-bg-color: [12, 12, 12, 1.0]

gallery-header-padding-x: 6
gallery-header-padding-y: 6

